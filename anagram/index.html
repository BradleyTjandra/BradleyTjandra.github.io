<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anagram Helper – Bradley Tjandra</title>
  <link rel="stylesheet" type="text/css" href="../css/main.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    .tool-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 1.5rem;
      margin-top: 1.5rem;
      max-width: 520px;
    }

    .tool-card label {
      display: block;
      font-size: 0.8rem;
      font-weight: bold;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    .input-row { display: flex; gap: 0.5rem; margin-bottom: 0.3rem; }

    .tool-card input[type="text"] {
      flex: 1;
      padding: 0.55rem 0.8rem;
      border: 1px solid #d1d5db;
      border-radius: 0.35rem;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #333;
      font-family: 'Helvetica', 'Arial', sans-serif;
    }

    .tool-card input[type="text"]:focus {
      outline: none;
      border-color: #999;
    }

    .input-hint {
      font-size: 0.72rem;
      color: #aaa;
      margin-bottom: 1rem;
    }

    .btn {
      padding: 0.55rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.35rem;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      background: #f3f4f6;
      color: #555;
      font-family: 'Helvetica', 'Arial', sans-serif;
      white-space: nowrap;
    }
    .btn:hover { background: #e5e7eb; }
    .btn:active { transform: scale(0.97); }

    .section-label {
      font-size: 0.75rem;
      font-weight: bold;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 1rem 0 0.5rem;
    }

    .letter-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols, 3), 1fr);
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .tile {
      aspect-ratio: 1;
      font-size: 1.2rem;
      font-weight: bold;
      text-transform: uppercase;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 0.35rem;
      cursor: pointer;
      font-family: 'Helvetica', 'Arial', sans-serif;
      transition: background 0.12s, transform 0.1s;
    }
    .tile:hover:not(.used) { background: #555; transform: scale(1.06); }
    .tile.used { background: #e5e7eb; color: #bbb; cursor: not-allowed; pointer-events: none; }

    .action-row { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; flex-wrap: wrap; }

    .btn-action {
      padding: 0.35rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.35rem;
      font-size: 0.8rem;
      font-weight: bold;
      cursor: pointer;
      background: #f3f4f6;
      color: #555;
      font-family: 'Helvetica', 'Arial', sans-serif;
      white-space: nowrap;
    }
    .btn-action:hover { background: #e5e7eb; }

    .answer-slots-area { outline: none; }

    .answer-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.5rem;
      align-items: center;
    }

    .slot {
      width: 2.4rem;
      height: 2.6rem;
      border: 1px solid #d1d5db;
      border-radius: 0.35rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Helvetica', 'Arial', sans-serif;
      background: #fff;
      position: relative;
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
    }

    .slot.empty { background: #fafafa; }
    .slot.empty::after {
      content: '';
      display: block;
      width: 0.8rem;
      height: 2px;
      background: #d1d5db;
      border-radius: 1px;
    }

    .slot.filled-tile { background: #f3f4f6; border-color: #555; color: #333; }
    .slot.filled-tile:hover { background: #e5e7eb; }

    .slot.filled-typed { background: #f0fdf4; border-color: #6b7280; color: #333; }
    .slot.filled-typed:hover { background: #e5e7eb; }

    .slot.unknown { background: #fefce8; border-color: #d1a520; color: #92680a; }
    .slot.unknown:hover { background: #fef9c3; }

    .slot.selected {
      border-color: #333 !important;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
      transform: scale(1.08);
      z-index: 1;
    }
    .slot.selected::after { background: #333; }

    .slot-end-cursor {
      width: 0.15rem;
      height: 2.6rem;
      background: #555;
      border-radius: 2px;
      animation: blink 1s step-start infinite;
      align-self: center;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .slot-split {
      min-width: 1.2rem;
      height: 2.6rem;
      padding: 0 0.25rem;
      border: 1px dashed #ccc;
      border-radius: 0.3rem;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
      color: #bbb;
      cursor: pointer;
      font-family: 'Helvetica', 'Arial', sans-serif;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .slot-split:hover { background: #f3f4f6; border-color: #999; color: #555; }
    .slot-split.selected { border-color: #333 !important; box-shadow: 0 0 0 2px rgba(0,0,0,0.2); }

    .hint { font-size: 0.72rem; color: #bbb; font-style: italic; }

    @media (max-width: 380px) {
      .tile { font-size: 1rem; }
      .slot { width: 2rem; font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="content">
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/cv">CV</a></li>
        <li><a href="/anagram">Anagram</a></li>
      </ul>
    </nav>

    <div class="container">
      <h1>Anagram Helper</h1>
      <p>A tool for solving cryptic crossword anagrams.</p>

      <div class="tool-card">
        <label for="letter-input">Enter your letters</label>
        <div class="input-row">
          <input
            type="text"
            id="letter-input"
            placeholder="e.g. AT ONE"
            maxlength="40"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="characters"
            spellcheck="false"
          >
          <button id="clear-btn" class="btn">Clear</button>
        </div>
        <p class="input-hint">Use spaces to indicate word breaks in the answer</p>

        <div id="grid-section" hidden>
          <p class="section-label">Letters</p>
          <div class="letter-grid" id="letter-grid"></div>
        </div>

        <div id="answer-section" hidden>
          <p class="section-label">Answer</p>
          <div class="action-row">
            <button id="btn-unknown" class="btn-action">? Unknown</button>
            <button id="btn-split" class="btn-action">| Word split</button>
          </div>
          <div class="answer-slots-area" id="answer-slots-area" tabindex="0">
            <div class="answer-slots" id="answer-slots"></div>
          </div>
          <p class="hint">Click a slot to select it · Type to fill · Backspace to clear · ← → to move</p>
        </div>
      </div>
    </div>

    <footer>
      <ul>
        <li><a href="mailto:bjtjandra@gmail.com">email</a></li>
        <li><a href="https://github.com/bradleytjandra">github</a></li>
      </ul>
    </footer>
  </div>

  <script>
    let state = { tiles: [], slots: [], selectedSlot: null };

    const letterInput   = document.getElementById('letter-input');
    const clearBtn      = document.getElementById('clear-btn');
    const gridSection   = document.getElementById('grid-section');
    const letterGrid    = document.getElementById('letter-grid');
    const answerSection = document.getElementById('answer-section');
    const answerSlotsEl = document.getElementById('answer-slots');
    const answerArea    = document.getElementById('answer-slots-area');
    const btnUnknown    = document.getElementById('btn-unknown');
    const btnSplit      = document.getElementById('btn-split');

    function parseInput(raw) {
      return raw.toUpperCase().replace(/[^A-Z ]/g, '').replace(/ {2,}/g, ' ').slice(0, 40).split('');
    }
    function computeCols(n) { return n === 0 ? 0 : Math.ceil(Math.sqrt(n)); }
    function columnFirst(letters, cols) {
      if (cols === 0) return [];
      const rows = Math.ceil(letters.length / cols), result = [];
      for (let col = 0; col < cols; col++)
        for (let row = 0; row < rows; row++) {
          const i = row * cols + col;
          if (i < letters.length) result.push({ letter: letters[i], srcIndex: i });
        }
      return result;
    }
    function makeTiledSlot()   { return { type: 'letter', value: null, tileIndex: null, typed: false, el: null }; }
    function makeSplitSlot()   { return { type: 'split',   el: null }; }
    function makeUnknownSlot() { return { type: 'unknown', el: null }; }

    function buildGrid(letters) {
      const nonSpace = letters.filter(l => l !== ' ');
      const cols = computeCols(nonSpace.length);
      letterGrid.style.setProperty('--cols', cols);
      letterGrid.innerHTML = '';
      state.tiles = nonSpace.map((letter, index) => ({ letter, index, used: false, el: null }));
      columnFirst(nonSpace, cols).forEach(({ letter, srcIndex }) => {
        const btn = document.createElement('button');
        btn.className = 'tile';
        btn.textContent = letter;
        btn.dataset.index = srcIndex;
        btn.addEventListener('click', onTileClick);
        letterGrid.appendChild(btn);
        state.tiles[srcIndex].el = btn;
      });
    }

    function buildSlots(letters) {
      state.slots = letters.map(l => l === ' ' ? makeSplitSlot() : makeTiledSlot());
      state.selectedSlot = null;
      renderSlots();
      selectFirstEmpty();
    }

    function renderSlots() {
      answerSlotsEl.innerHTML = '';
      const atEnd = state.selectedSlot === state.slots.length;
      state.slots.forEach((slot, i) => {
        let el;
        if (slot.type === 'split') {
          el = document.createElement('button');
          el.className = 'slot-split';
          el.textContent = '|';
          el.title = 'Click to remove';
          if (state.selectedSlot === i) el.classList.add('selected');
        } else {
          el = document.createElement('button');
          el.className = 'slot';
          if (slot.type === 'unknown') { el.classList.add('unknown'); el.textContent = '?'; }
          else if (slot.value !== null) { el.classList.add(slot.typed ? 'filled-typed' : 'filled-tile'); el.textContent = slot.value; }
          else { el.classList.add('empty'); }
          if (state.selectedSlot === i) el.classList.add('selected');
        }
        el.dataset.slotIndex = i;
        el.addEventListener('click', onSlotClick);
        answerSlotsEl.appendChild(el);
        slot.el = el;
      });
      if (atEnd) {
        const cursor = document.createElement('div');
        cursor.className = 'slot-end-cursor';
        answerSlotsEl.appendChild(cursor);
      }
    }

    function selectSlot(i) { state.selectedSlot = i; renderSlots(); }
    function selectFirstEmpty() {
      const i = state.slots.findIndex(s => s.type === 'letter' && s.value === null);
      state.selectedSlot = i >= 0 ? i : state.slots.length;
      renderSlots();
    }
    function advanceSelection() {
      const start = state.selectedSlot ?? -1;
      for (let i = start + 1; i < state.slots.length; i++)
        if (state.slots[i].type === 'letter' && state.slots[i].value === null) { selectSlot(i); return; }
      selectSlot(state.slots.length);
    }
    function clearSlot(i) {
      const slot = state.slots[i];
      if (!slot || slot.type === 'split') return;
      if (slot.tileIndex !== null) { state.tiles[slot.tileIndex].used = false; state.tiles[slot.tileIndex].el.classList.remove('used'); }
      slot.type = 'letter'; slot.value = null; slot.tileIndex = null; slot.typed = false;
    }

    function onSlotClick(e) {
      const i = parseInt(e.currentTarget.dataset.slotIndex, 10);
      const slot = state.slots[i];
      if (slot.type === 'split') {
        state.slots.splice(i, 1);
        if (state.selectedSlot !== null) {
          if (state.selectedSlot > i) state.selectedSlot--;
          else if (state.selectedSlot === i) state.selectedSlot = null;
        }
        renderSlots(); answerArea.focus(); return;
      }
      if (state.selectedSlot === i) { clearSlot(i); renderSlots(); answerArea.focus(); return; }
      if (slot.type === 'unknown' || slot.value !== null) clearSlot(i);
      selectSlot(i); answerArea.focus();
    }

    function fillSelectedSlot(letter, tileIndex, typed) {
      const si = state.selectedSlot;
      if (si === state.slots.length) {
        const newSlot = makeTiledSlot();
        newSlot.value = letter; newSlot.tileIndex = tileIndex; newSlot.typed = typed;
        state.slots.push(newSlot);
        state.selectedSlot = state.slots.length;
        renderSlots(); return;
      }
      if (si === null) return;
      const slot = state.slots[si];
      if (!slot || slot.type === 'split') return;
      clearSlot(si);
      slot.value = letter; slot.tileIndex = tileIndex; slot.typed = typed;
      if (slot.type !== 'letter') slot.type = 'letter';
      advanceSelection();
    }

    function onTileClick(e) {
      const tileIndex = parseInt(e.currentTarget.dataset.index, 10);
      const tile = state.tiles[tileIndex];
      if (tile.used) return;
      if (state.selectedSlot === null) {
        const firstEmpty = state.slots.findIndex(s => s.type === 'letter' && s.value === null);
        state.selectedSlot = firstEmpty >= 0 ? firstEmpty : state.slots.length;
      }
      tile.used = true; tile.el.classList.add('used');
      fillSelectedSlot(tile.letter, tileIndex, false);
    }

    answerArea.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      const key = e.key;
      if (/^[a-zA-Z]$/.test(key)) {
        e.preventDefault();
        if (state.selectedSlot === null) state.selectedSlot = state.slots.length;
        fillSelectedSlot(key.toUpperCase(), null, true); return;
      }
      if (key === ' ') {
        e.preventDefault();
        const insertAt = state.selectedSlot !== null ? state.selectedSlot : state.slots.length;
        state.slots.splice(insertAt, 0, makeSplitSlot());
        state.selectedSlot = Math.min(insertAt + 1, state.slots.length);
        renderSlots(); return;
      }
      if (key === 'Backspace') {
        e.preventDefault();
        const si = state.selectedSlot;
        if (si === state.slots.length && si > 0) { state.selectedSlot = si - 1; handleBackspaceAt(state.selectedSlot); return; }
        if (si !== null && si < state.slots.length) handleBackspaceAt(si);
        return;
      }
      if (key === 'ArrowLeft') { e.preventDefault(); const si = state.selectedSlot ?? state.slots.length; if (si > 0) selectSlot(si - 1); return; }
      if (key === 'ArrowRight') { e.preventDefault(); const si = state.selectedSlot ?? -1; if (si < state.slots.length) selectSlot(si + 1); return; }
    });

    function handleBackspaceAt(i) {
      const slot = state.slots[i];
      if (!slot) return;
      if (slot.type === 'split') { state.slots.splice(i, 1); state.selectedSlot = Math.min(i, state.slots.length); renderSlots(); return; }
      if (slot.type === 'unknown' || slot.value !== null) { clearSlot(i); renderSlots(); }
    }

    btnUnknown.addEventListener('click', () => {
      const si = state.selectedSlot;
      if (si === null) return;
      if (si === state.slots.length) { state.slots.push(makeUnknownSlot()); state.selectedSlot = state.slots.length; renderSlots(); answerArea.focus(); return; }
      const slot = state.slots[si];
      if (slot.type === 'split') return;
      clearSlot(si); slot.type = 'unknown';
      advanceSelection(); answerArea.focus();
    });

    btnSplit.addEventListener('click', () => {
      const insertAt = state.selectedSlot !== null ? state.selectedSlot : state.slots.length;
      state.slots.splice(insertAt, 0, makeSplitSlot());
      state.selectedSlot = Math.min(insertAt + 1, state.slots.length);
      renderSlots(); answerArea.focus();
    });

    letterInput.addEventListener('input', function () {
      const letters = parseInput(this.value);
      state.tiles.forEach(t => { if (t.el) t.el.classList.remove('used'); });
      if (letters.length === 0) {
        gridSection.hidden = true; answerSection.hidden = true;
        state.tiles = []; state.slots = []; return;
      }
      buildGrid(letters); buildSlots(letters);
      gridSection.hidden = false; answerSection.hidden = false;
    });

    clearBtn.addEventListener('click', () => {
      letterInput.value = ''; state.tiles = []; state.slots = []; state.selectedSlot = null;
      letterGrid.innerHTML = ''; answerSlotsEl.innerHTML = '';
      gridSection.hidden = true; answerSection.hidden = true;
      letterInput.focus();
    });

    letterInput.focus();
  </script>
</body>
</html>
